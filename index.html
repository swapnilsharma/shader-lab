<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>frakt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

<!-- ═══ PRESET GALLERY MODAL ═══ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Start with a preset</span>
    </div>
    <div class="preset-gallery" id="preset-gallery">
      <!-- Generated by engine.js -->
    </div>
  </div>
</div>

<!-- ═══ LAYER CONTEXT MENU ═══ -->
<div class="ctx-menu hidden" id="ctx-menu">
  <div class="ctx-item" data-action="rename">Rename</div>
  <div class="ctx-item" data-action="duplicate">Duplicate</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item ctx-item--danger" data-action="delete">Delete</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item" data-action="move-top">Move to Top</div>
  <div class="ctx-item" data-action="move-bottom">Move to Bottom</div>
</div>

<!-- ═══ ADD LAYER POPOVER ═══ -->
<div class="layer-popover hidden" id="layer-popover">
  <div class="pop-label">CONTENT</div>
  <div class="pop-item" data-type="solid">Solid</div>
  <div class="pop-item" data-type="gradient">Gradient</div>
  <div class="pop-item" data-type="mesh-gradient">Mesh Gradient</div>
  <div class="pop-item" data-type="image">Image</div>
  <div class="pop-divider"></div>
  <div class="pop-label">EFFECTS</div>
  <div class="pop-item" data-type="noise-warp">Noise Warp</div>
  <div class="pop-item" data-type="wave">Wave</div>
  <div class="pop-item" data-type="liquid">Liquid</div>
  <div class="pop-item" data-type="grain">Grain</div>
  <div class="pop-item" data-type="chromatic-aberration">Chromatic Aberration</div>
  <div class="pop-item" data-type="vignette">Vignette</div>
  <div class="pop-item" data-type="color-grade">Color Grade</div>
  <div class="pop-item" data-type="posterize">Posterize</div>
  <div class="pop-item" data-type="pixelate">Pixelate</div>
  <div class="pop-item" data-type="scanlines">Scanlines</div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="app">
  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="app-name">frakt</span>
      <span class="topbar-sep">—</span>
      <span class="topbar-file" id="topbar-file-label" title="Click to rename">untitled</span>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-undo" onclick="undo()" title="Undo (⌘Z)" disabled>
        <svg viewBox="0 0 14 14" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7a4 4 0 1 0 1-3.2"/><polyline points="1,2.5 3,6.5 6.5,5"/></svg>
      </button>
      <button class="tb-btn" id="btn-redo" onclick="redo()" title="Redo (⌘⇧Z)" disabled>
        <svg viewBox="0 0 14 14" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 7a4 4 0 1 1-1-3.2"/><polyline points="13,2.5 11,6.5 7.5,5"/></svg>
      </button>
    </div>
    <div class="topbar-center">
      <button class="tb-btn active" id="btn-play" onclick="togglePlay()" title="Play / Pause">
        <svg viewBox="0 0 14 14" width="11" height="11"><polygon points="3,1 12,7 3,13" fill="currentColor"/></svg>
      </button>
      <button class="tb-btn" onclick="restartTime()" title="Restart">
        <svg viewBox="0 0 14 14" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 7a5 5 0 1 0 1.2-3.3"/><polyline points="1.5,2 2.5,5.5 6,4.5"/></svg>
      </button>
      <span class="topbar-time" id="topbar-time">0:00.0</span>
    </div>
    <div class="topbar-right">
      <button class="tb-btn" onclick="openModal()" title="Open preset gallery">Presets</button>
      <button class="tb-btn tb-btn--primary" id="btn-export" onclick="copyCode()" title="Export as GLSL">Export</button>
    </div>
  </header>

  <!-- BODY: LEFT + CANVAS + RIGHT -->
  <div class="app-body">

    <!-- LEFT PANEL -->
    <aside class="panel-left">
      <div class="panel-header">
        <span class="panel-label">LAYERS</span>
        <button class="btn-add-layer" id="btn-add-layer" title="Add layer">+ ▾</button>
      </div>
      <div class="layer-stack" id="layer-stack"></div>
      <div class="frame-layer-area">
        <div class="frame-sep"></div>
        <div class="frame-row" id="frame-row" onclick="selectLayer('frame')">
          <span class="layer-icon-frame">□</span>
          <span class="frame-name">Frame</span>
        </div>
      </div>
    </aside>

    <!-- CANVAS -->
    <main class="canvas-area" id="canvas-area">
      <canvas id="glcanvas"></canvas>
    </main>

    <!-- RIGHT PANEL -->
    <aside class="panel-right" id="panel-right">
      <!-- Populated by engine.js -->
    </aside>

  </div>

  <!-- STATUSBAR -->
  <footer class="statusbar">
    <div class="statusbar-left">
      <span class="statusbar-dot statusbar-dot--live" id="status-dot"></span>
      <span class="statusbar-text" id="status-text">Live</span>
      <span class="statusbar-error" id="status-error"></span>
    </div>
    <div class="statusbar-right">
      <span id="status-fps">60 fps</span>
      <span id="status-dims">800 × 600</span>
    </div>
  </footer>
</div>

<!-- ═══ CONFIRM DIALOG ═══ -->
<div class="confirm-overlay hidden" id="confirm-overlay">
  <div class="confirm-dialog">
    <div class="confirm-title" id="confirm-title">Confirm</div>
    <div class="confirm-subtitle" id="confirm-subtitle"></div>
    <div class="confirm-actions">
      <button class="confirm-btn confirm-btn--cancel" id="confirm-cancel">Cancel</button>
      <button class="confirm-btn confirm-btn--ok" id="confirm-ok">Confirm</button>
    </div>
  </div>
</div>

<!-- Hidden image input -->
<input type="file" id="img-input" accept="image/png,image/jpeg,image/webp" style="display:none" onchange="onImageUpload(this)">

<script src="presets.js"></script>
<script src="renderer.js"></script>
<script src="engine.js"></script>
</body>
</html>
